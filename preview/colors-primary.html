<!doctype html>
<html lang="es"><head><meta charset="utf-8"><title>Primary blues</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg);font-family:var(--font-sans);}
  .wrap{padding:var(--s-5);}
  .scale{display:grid;grid-template-columns:repeat(8,1fr);gap:6px;}
  .sw{border-radius:8px;aspect-ratio:1/1;position:relative;}
  .lbl{display:grid;grid-template-columns:repeat(8,1fr);gap:6px;margin-top:var(--s-2);}
  .lbl div{font-family:var(--font-mono);font-size:10px;color:var(--fg-muted);text-align:center;line-height:1.2;}
  .lbl b{display:block;color:var(--fg);font-size:11px;font-family:var(--font-sans);font-weight:600;}
</style></head>
<body>
<div class="wrap">
  <div class="scale">
    <div class="sw" style="background:#0A2A6B"></div>
    <div class="sw" style="background:#123A8F"></div>
    <div class="sw" style="background:#1B52C2"></div>
    <div class="sw" style="background:#2166D8"></div>
    <div class="sw" style="background:#3A86E8"></div>
    <div class="sw" style="background:#6AB0EE"></div>
    <div class="sw" style="background:#9AD3F4"></div>
    <div class="sw" style="background:#2BC4D9"></div>
  </div>
  <div class="lbl">
    <div><b>900</b>0A2A6B</div>
    <div><b>800</b>123A8F</div>
    <div><b>700</b>1B52C2</div>
    <div><b>600</b>2166D8</div>
    <div><b>500</b>3A86E8</div>
    <div><b>400</b>6AB0EE</div>
    <div><b>300</b>9AD3F4</div>
    <div><b>cyan</b>2BC4D9</div>
  </div>
</div>
</body></html>
