<!doctype html>
<html lang="es"><head><meta charset="utf-8"><title>Spacing scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg);font-family:var(--font-sans);}
  .wrap{padding:var(--s-5);}
  .row{display:flex;align-items:center;gap:var(--s-3);margin-bottom:6px;font-size:12px;}
  .row .bar{background:var(--teslan-blue-700);height:14px;border-radius:3px;}
  .row .nm{width:50px;font-family:var(--font-mono);color:var(--fg-muted);}
  .row .px{margin-left:auto;font-family:var(--font-mono);color:var(--fg-muted);}
</style></head>
<body>
<div class="wrap">
  <div class="row"><span class="nm">s-1</span><span class="bar" style="width:4px"></span><span class="px">4px</span></div>
  <div class="row"><span class="nm">s-2</span><span class="bar" style="width:8px"></span><span class="px">8px</span></div>
  <div class="row"><span class="nm">s-3</span><span class="bar" style="width:12px"></span><span class="px">12px</span></div>
  <div class="row"><span class="nm">s-4</span><span class="bar" style="width:16px"></span><span class="px">16px</span></div>
  <div class="row"><span class="nm">s-6</span><span class="bar" style="width:24px"></span><span class="px">24px</span></div>
  <div class="row"><span class="nm">s-8</span><span class="bar" style="width:32px"></span><span class="px">32px</span></div>
  <div class="row"><span class="nm">s-12</span><span class="bar" style="width:48px"></span><span class="px">48px</span></div>
  <div class="row"><span class="nm">s-16</span><span class="bar" style="width:64px"></span><span class="px">64px</span></div>
  <div class="row"><span class="nm">s-20</span><span class="bar" style="width:80px"></span><span class="px">80px</span></div>
</div>
</body></html>
