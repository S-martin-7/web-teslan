<!doctype html>
<html lang="es"><head><meta charset="utf-8"><title>Form inputs</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg);font-family:var(--font-sans);}
  .wrap{padding:var(--s-5);display:grid;grid-template-columns:1fr 1fr;gap:var(--s-4);}
  label{font-size:12px;font-weight:600;color:var(--fg-muted);text-transform:uppercase;letter-spacing:0.04em;display:block;margin-bottom:6px;}
  .input,textarea,select{width:100%;padding:12px 14px;border:1px solid var(--border);border-radius:var(--r-md);background:#fff;font-family:inherit;font-size:14px;color:var(--fg);box-sizing:border-box;transition:border-color var(--dur-fast) var(--ease-standard),box-shadow var(--dur-fast) var(--ease-standard);}
  .input:focus,textarea:focus,select:focus{outline:none;border-color:var(--teslan-blue-500);box-shadow:0 0 0 3px rgba(58,134,232,0.15);}
  .input.error{border-color:var(--status-danger);}
  .hint{font-size:12px;color:var(--fg-muted);margin-top:4px;}
  .err{font-size:12px;color:var(--status-danger);margin-top:4px;}
</style></head>
<body>
<div class="wrap">
  <div>
    <label>Nombre</label>
    <input class="input" placeholder="Empresa o contacto" value="Minera Escondida">
  </div>
  <div>
    <label>Email</label>
    <input class="input" type="email" value="ops@example.cl">
  </div>
  <div>
    <label>Ubicación</label>
    <select class="input"><option>Antofagasta</option><option>Iquique</option></select>
  </div>
  <div>
    <label>Tipo de servicio</label>
    <input class="input error" placeholder="Selecciona">
    <div class="err">Campo requerido</div>
  </div>
</div>
</body></html>
