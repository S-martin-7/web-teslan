<!doctype html>
<html lang="es"><head><meta charset="utf-8"><title>Accent — orange & green</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg);font-family:var(--font-sans);}
  .wrap{padding:var(--s-5);}
  .row{display:grid;grid-template-columns:1fr 1fr;gap:var(--s-5);}
  .fam h5{margin:0 0 8px;font-size:12px;text-transform:uppercase;letter-spacing:0.06em;color:var(--fg-muted);}
  .scale{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;}
  .sw{aspect-ratio:1/1;border-radius:8px;}
  .lbl{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:6px;}
  .lbl div{font-family:var(--font-mono);font-size:10px;color:var(--fg-muted);text-align:center;}
  .lbl b{display:block;font-family:var(--font-sans);color:var(--fg);font-weight:600;font-size:11px;}
</style></head>
<body>
<div class="wrap">
  <div class="row">
    <div class="fam">
      <h5>Accent — CTA orange</h5>
      <div class="scale">
        <div class="sw" style="background:#D9621A"></div>
        <div class="sw" style="background:#E87824"></div>
        <div class="sw" style="background:#F08A36"></div>
        <div class="sw" style="background:#F6A260"></div>
      </div>
      <div class="lbl">
        <div><b>700</b>D9621A</div><div><b>600★</b>E87824</div><div><b>500</b>F08A36</div><div><b>400</b>F6A260</div>
      </div>
    </div>
    <div class="fam">
      <h5>Support — WhatsApp green</h5>
      <div class="scale">
        <div class="sw" style="background:#1FA855"></div>
        <div class="sw" style="background:#25D366"></div>
        <div class="sw" style="background:#9BE7B8"></div>
        <div class="sw" style="background:transparent;border:1px dashed var(--border);"></div>
      </div>
      <div class="lbl">
        <div><b>600★</b>1FA855</div><div><b>500</b>25D366</div><div><b>300</b>9BE7B8</div><div>—</div>
      </div>
    </div>
  </div>
</div>
</body></html>
