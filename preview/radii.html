<!doctype html>
<html lang="es"><head><meta charset="utf-8"><title>Radii</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg);font-family:var(--font-sans);}
  .wrap{padding:var(--s-5);display:flex;gap:var(--s-4);align-items:flex-end;}
  .tile{width:80px;height:80px;background:var(--teslan-blue-700);display:flex;align-items:flex-end;justify-content:center;color:#fff;font-family:var(--font-mono);font-size:10px;padding-bottom:6px;}
  .cap{text-align:center;font-size:11px;color:var(--fg-muted);margin-top:6px;font-family:var(--font-mono);}
</style></head>
<body>
<div class="wrap">
  <div><div class="tile" style="border-radius:4px">xs</div><div class="cap">4px</div></div>
  <div><div class="tile" style="border-radius:6px">sm</div><div class="cap">6px</div></div>
  <div><div class="tile" style="border-radius:10px">md</div><div class="cap">10px</div></div>
  <div><div class="tile" style="border-radius:14px">lg</div><div class="cap">14px</div></div>
  <div><div class="tile" style="border-radius:20px">xl</div><div class="cap">20px</div></div>
  <div><div class="tile" style="border-radius:28px">2xl</div><div class="cap">28px</div></div>
  <div><div class="tile" style="border-radius:999px">pill</div><div class="cap">999px</div></div>
</div>
</body></html>
