<!doctype html>
<html lang="es"><head><meta charset="utf-8"><title>Icons — Lucide</title>
<link rel="stylesheet" href="../colors_and_type.css">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  html,body{margin:0;padding:0;background:var(--bg);font-family:var(--font-sans);}
  .wrap{padding:var(--s-5);display:grid;grid-template-columns:repeat(8,1fr);gap:var(--s-3);}
  .cell{display:flex;flex-direction:column;align-items:center;gap:6px;color:var(--teslan-blue-700);}
  .cell svg{width:28px;height:28px;stroke-width:1.75;}
  .cell span{font-family:var(--font-mono);font-size:10px;color:var(--fg-muted);}
</style></head>
<body>
<div class="wrap">
  <div class="cell"><i data-lucide="map-pin"></i><span>map-pin</span></div>
  <div class="cell"><i data-lucide="radio-tower"></i><span>radio-tower</span></div>
  <div class="cell"><i data-lucide="cable"></i><span>cable</span></div>
  <div class="cell"><i data-lucide="share-2"></i><span>share-2</span></div>
  <div class="cell"><i data-lucide="hard-hat"></i><span>hard-hat</span></div>
  <div class="cell"><i data-lucide="video"></i><span>video</span></div>
  <div class="cell"><i data-lucide="wifi"></i><span>wifi</span></div>
  <div class="cell"><i data-lucide="shield-check"></i><span>shield</span></div>
  <div class="cell"><i data-lucide="radio"></i><span>radio</span></div>
  <div class="cell"><i data-lucide="server"></i><span>server</span></div>
  <div class="cell"><i data-lucide="file-text"></i><span>file-text</span></div>
  <div class="cell"><i data-lucide="phone"></i><span>phone</span></div>
  <div class="cell"><i data-lucide="mail"></i><span>mail</span></div>
  <div class="cell"><i data-lucide="arrow-right"></i><span>arrow-right</span></div>
  <div class="cell"><i data-lucide="check-circle"></i><span>check</span></div>
  <div class="cell"><i data-lucide="zap"></i><span>zap</span></div>
</div>
<script>lucide.createIcons();</script>
</body></html>
