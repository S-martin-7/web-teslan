<!doctype html>
<html lang="es"><head><meta charset="utf-8"><title>Neutrals</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg);font-family:var(--font-sans);}
  .wrap{padding:var(--s-5);}
  .scale{display:grid;grid-template-columns:repeat(10,1fr);gap:4px;}
  .sw{aspect-ratio:1/1.2;border-radius:6px;border:1px solid rgba(0,0,0,0.04);}
  .lbl{display:grid;grid-template-columns:repeat(10,1fr);gap:4px;margin-top:6px;}
  .lbl div{font-family:var(--font-mono);font-size:9px;color:var(--fg-muted);text-align:center;line-height:1.2;}
  .lbl b{display:block;color:var(--fg);font-size:10px;font-family:var(--font-sans);font-weight:600;}
</style></head>
<body>
<div class="wrap">
  <div class="scale">
    <div class="sw" style="background:#FFFFFF"></div>
    <div class="sw" style="background:#F7F9FC"></div>
    <div class="sw" style="background:#EEF2F7"></div>
    <div class="sw" style="background:#DDE3EC"></div>
    <div class="sw" style="background:#BDC6D2"></div>
    <div class="sw" style="background:#8A95A4"></div>
    <div class="sw" style="background:#5E6876"></div>
    <div class="sw" style="background:#404A59"></div>
    <div class="sw" style="background:#1B2130"></div>
    <div class="sw" style="background:#0F1320"></div>
  </div>
  <div class="lbl">
    <div><b>0</b>FFF</div><div><b>50</b>F7F9FC</div><div><b>100</b>EEF2F7</div><div><b>200</b>DDE3EC</div><div><b>300</b>BDC6D2</div><div><b>400</b>8A95A4</div><div><b>500</b>5E6876</div><div><b>600</b>404A59</div><div><b>800</b>1B2130</div><div><b>900</b>0F1320</div>
  </div>
</div>
</body></html>
