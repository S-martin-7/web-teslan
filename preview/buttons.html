<!doctype html>
<html lang="es"><head><meta charset="utf-8"><title>Buttons</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg);font-family:var(--font-sans);}
  .wrap{padding:var(--s-5);display:flex;gap:var(--s-3);flex-wrap:wrap;align-items:center;}
  .btn{display:inline-flex;align-items:center;gap:8px;padding:12px 22px;border-radius:var(--r-pill);font-weight:600;font-size:14px;border:0;cursor:pointer;transition:all var(--dur-med) var(--ease-standard);font-family:inherit;}
  .btn-primary{background:var(--accent-orange-600);color:#fff;box-shadow:var(--sh-cta);}
  .btn-primary:hover{background:var(--accent-orange-700);}
  .btn-secondary{background:transparent;color:var(--fg-strong);border:1.5px solid var(--neutral-300);}
  .btn-secondary:hover{background:var(--neutral-100);}
  .btn-whatsapp{background:var(--support-green-600);color:#fff;}
  .btn-ghost{background:transparent;color:var(--teslan-blue-700);border:1.5px solid var(--teslan-blue-700);}
  .btn-dark{background:#fff;color:var(--teslan-blue-900);}
  .arrow{width:16px;height:16px;}
</style></head>
<body>
<div class="wrap">
  <button class="btn btn-primary">Solicitar evaluación
    <svg class="arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
  </button>
  <button class="btn btn-secondary">Ver servicios</button>
  <button class="btn btn-whatsapp">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M17.5 14.4c-.3-.1-1.7-.8-2-.9-.3-.1-.5-.1-.7.1-.2.3-.8.9-1 1.1-.2.2-.4.2-.7.1-.3-.1-1.2-.4-2.3-1.4-.8-.8-1.4-1.7-1.5-2-.2-.3 0-.5.1-.6.1-.1.3-.4.4-.5.1-.2.2-.3.3-.5.1-.2 0-.4 0-.5 0-.1-.7-1.6-.9-2.2-.2-.6-.5-.5-.7-.5h-.6c-.2 0-.5.1-.8.4-.3.3-1 1-1 2.4s1 2.8 1.2 3c.1.2 2 3 4.8 4.2 2.8 1.2 2.8.8 3.3.8.5-.1 1.7-.7 1.9-1.3.2-.7.2-1.2.2-1.3-.1-.1-.3-.2-.6-.3z"/><path d="M20 3.8A11.2 11.2 0 0 0 12 .5a11.4 11.4 0 0 0-9.7 17.4L.5 23.5l5.8-1.5a11.4 11.4 0 0 0 5.7 1.5A11.4 11.4 0 0 0 20 3.8zM12.1 21.5h-.1a9.4 9.4 0 0 1-4.8-1.3l-.3-.2-3.5.9.9-3.4-.2-.4A9.5 9.5 0 1 1 12.1 21.5z"/></svg>
    WhatsApp
  </button>
  <button class="btn btn-ghost">Conocer todos los servicios</button>
</div>
</body></html>
