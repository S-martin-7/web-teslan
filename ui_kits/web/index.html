<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Teslan — Infraestructura y despliegue técnico</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="../../colors_and_type.css">
  <style>
    body { margin: 0; background: #fff; }
    * { box-sizing: border-box; }
    button:hover { filter: brightness(1.05); }
    .hero-network {
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0.72;
      mix-blend-mode: screen;
    }
    .hero-network path {
      stroke-dasharray: 10 18;
      animation: teslan-dash 14s linear infinite;
    }
    .hero-network circle {
      transform-box: fill-box;
      transform-origin: center;
      animation: teslan-pulse 3.6s ease-in-out infinite;
    }
    .hero-network circle:nth-of-type(2n) { animation-delay: 0.7s; }
    .hero-network circle:nth-of-type(3n) { animation-delay: 1.4s; }
    .signal-ring {
      animation: teslan-ring 3s ease-out infinite;
      transform-box: fill-box;
      transform-origin: center;
    }
    .map-route {
      stroke-dasharray: 420;
      stroke-dashoffset: 420;
      animation: teslan-draw 4.6s var(--ease-emphasis) infinite alternate;
    }
    .map-node {
      transform-box: fill-box;
      transform-origin: center;
      animation: teslan-map-pulse 2.6s ease-in-out infinite;
    }
    .map-node:nth-of-type(2n) { animation-delay: 0.45s; }
    .map-node:nth-of-type(3n) { animation-delay: 0.9s; }
    .motion-card {
      transition: transform var(--dur-med) var(--ease-standard), box-shadow var(--dur-med) var(--ease-standard), border-color var(--dur-med) var(--ease-standard);
    }
    .motion-card:hover {
      transform: translateY(-3px);
      box-shadow: var(--sh-lg);
      border-color: rgba(43,196,217,0.35);
    }
    @keyframes teslan-dash {
      to { stroke-dashoffset: -280; }
    }
    @keyframes teslan-pulse {
      0%, 100% { opacity: 0.35; transform: scale(0.92); }
      50% { opacity: 1; transform: scale(1.08); }
    }
    @keyframes teslan-ring {
      0% { opacity: 0.6; transform: scale(0.7); }
      100% { opacity: 0; transform: scale(1.9); }
    }
    @keyframes teslan-draw {
      to { stroke-dashoffset: 0; }
    }
    @keyframes teslan-map-pulse {
      0%, 100% { filter: drop-shadow(0 0 0 rgba(43,196,217,0)); transform: scale(1); }
      50% { filter: drop-shadow(0 0 10px rgba(43,196,217,0.7)); transform: scale(1.12); }
    }
    @media (max-width: 760px) {
      .hero-network { opacity: 0.38; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

  <script type="text/babel" src="Header.jsx"></script>
  <script type="text/babel" src="Hero.jsx"></script>
  <script type="text/babel" src="FeatureBar.jsx"></script>
  <script type="text/babel" src="ServicesGrid.jsx"></script>
  <script type="text/babel" src="CoverageMap.jsx"></script>
  <script type="text/babel" src="ProjectShowcase.jsx"></script>
  <script type="text/babel" src="CtaBanner.jsx"></script>
  <script type="text/babel" src="Footer.jsx"></script>
  <script type="text/babel" src="FloatingWhatsApp.jsx"></script>

  <script type="text/babel">
    function App() {
      React.useEffect(() => {
        if (window.lucide) window.lucide.createIcons();
      });
      return (
        <>
          <Header />
          <Hero />
          <FeatureBar />
          <ServicesGrid />
          <CoverageMap />
          <ProjectShowcase />
          <CtaBanner />
          <Footer />
          <FloatingWhatsApp />
        </>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
